version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - npm install

  build:
    commands:
      - echo Build started on `date`
      - echo Running app build (if any)
      - npm run build || echo "No build step"

  post_build:
    commands:
      - echo Build completed on `date`
      - echo Preparing artifacts

artifacts:
  files:
    - '**/*'
  base-directory: .